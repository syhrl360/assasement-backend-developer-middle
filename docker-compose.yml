services:
    mysql:
        container_name: mysql
        image: mysql:8.4.8
        restart: always
        ports:
            - 3307:3306
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASES: ${MYSQL_DATABASE}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - spring-cloud-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p55555"]
            interval : 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    kafka:
        image: apache/kafka:3.9.2 
        container_name: kafka
        ports:
        - "9092:9092"
        - "9093:9093"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        healthcheck:
            test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh","--bootstrap-server", "localhost:9092"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s
        volumes:
            - kafka-data:/var/lib/kafka/data
        networks:
            - spring-cloud-network        


    eureka-server:
        container_name: eureka-server
        build:
            context: eureka-server
            dockerfile: Dockerfile
        image: eureka-server:0.0.1
        ports:
            - 8769:8769
        networks:
            - spring-cloud-network

    gateway:
        container_name: gateway
        build:
            context: gateway
            dockerfile: Dockerfile
        image: gateway:0.0.1
        ports:
            - 9090:9090
        networks:
            - spring-cloud-network        

    account-service:
        container_name: account-service
        build:
            context: account-service
            dockerfile: Dockerfile
        image: account-service:0.0.1
        ports:
            - 8089:8089
        env_file :
            - account-service/.env    
        depends_on :
            mysql:
                condition: service_healthy    
            kafka:
                condition: service_healthy    
        networks:
            - spring-cloud-network
        

    loan-service:
        container_name: loan-service
        build:
            context: loan-service
            dockerfile: Dockerfile
        image: loan-service:0.0.1
        ports:
            - 8087:8087
        env_file:
            - loan-service/.env
        depends_on :
            mysql:
                condition: service_healthy
            kafka:
                condition: service_healthy    
        networks:
            - spring-cloud-network

    payment-service:
        container_name: payment-service
        build:
            context: payment-service
            dockerfile: Dockerfile
        image: payment-service:0.0.1
        ports:
            - 8088:8088
        env_file:
            - payment-service/.env    
        depends_on :
            mysql:
                condition: service_healthy
            kafka:
                condition: service_healthy        
        networks:
            - spring-cloud-network
            
networks:
  spring-cloud-network:
    driver: bridge

volumes:
    db_data:
    kafka-data:    