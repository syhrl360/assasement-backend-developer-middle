services:
    mysql:
        container_name: mysql
        image: mysql:8.4.8
        restart: always
        ports:
            - 3307:3306
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASES: ${MYSQL_DATABASE}
        networks:
            - spring-cloud-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p55555"]
            interval : 10s
            timeout: 5s
            retries: 5
            start_period: 30s        


    eureka-server:
        container_name: eureka-server
        build:
            context: eureka-server
            dockerfile: Dockerfile
        image: eureka-server:0.0.1
        ports:
            - 8769:8769
        networks:
            - spring-cloud-network

    account-service:
        container_name: account-service
        build:
            context: account-service
            dockerfile: Dockerfile
        image: account-service:0.0.1
        ports:
            - 8089:8089
        env_file :
            - account-service/.env    
        depends_on :
            mysql:
                condition: service_healthy    
        networks:
            - spring-cloud-network
        volumes:
            - db_data:/var/lib/mysql

    loan-service:
        container_name: loan-service
        build:
            context: loan-service
            dockerfile: Dockerfile
        image: loan-service:0.0.1
        ports:
            - 8087:8087
        env_file:
            - loan-service/.env
        depends_on :
            mysql:
                condition: service_healthy
        networks:
            - spring-cloud-network

    payment-service:
        container_name: payment-service
        build:
            context: payment-service
            dockerfile: Dockerfile
        image: payment-service:0.0.1
        ports:
            - 8088:8088
        env_file:
            - payment-service/.env    
        depends_on :
            mysql:
                condition: service_healthy    
        networks:
            - spring-cloud-network
            
networks:
  spring-cloud-network:
    driver: bridge

volumes:
    db_data:    