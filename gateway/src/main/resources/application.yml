server:
  port: 9090

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8769/eureka
  instance:
    preferIpAddress: true

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: loan-service
              uri: lb://loan-service
              predicates:
                - Path=/loanRecord/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/paymentRecord/**

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/userAccount/**

